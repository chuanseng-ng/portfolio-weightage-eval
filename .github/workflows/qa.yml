name: QA Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  qa:
    name: QA — ${{ matrix.check }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    strategy:
      fail-fast: false          # run all checks even if one fails
      matrix:
        check: [ruff, mypy, pylint, pytest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync

      # ── ruff ──────────────────────────────────────────────────────────────
      - name: Ruff lint
        if: matrix.check == 'ruff'
        run: uv run ruff check src/ tests/ config/

      - name: Ruff format
        if: matrix.check == 'ruff'
        run: uv run ruff format --check src/ tests/ config/

      # ── mypy ──────────────────────────────────────────────────────────────
      - name: mypy
        if: matrix.check == 'mypy'
        run: uv run mypy

      # ── pylint ────────────────────────────────────────────────────────────
      - name: pylint (score ≥ 9.0)
        if: matrix.check == 'pylint'
        run: uv run pylint src/ config/ --fail-under=9.0

      # ── pytest + coverage ─────────────────────────────────────────────────
      - name: pytest (coverage ≥ 85%)
        if: matrix.check == 'pytest'
        run: |
          set -o pipefail
          uv run pytest -v --cov=src --cov-fail-under=85 --junitxml=pytest.xml --cov-report=term-missing:skip-covered | tee pytest-coverage.txt

      - name: Upload coverage report
        if: matrix.check == 'pytest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            pytest-coverage.txt
            pytest.xml

  # ── coverage publishing (elevated permissions isolated here) ────────────
  publish-coverage:
    name: Publish Coverage
    needs: qa
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write        # needed for actions-js/push to update README
      pull-requests: write   # needed for pytest-coverage-comment to post PR comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH deploy key (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.CODE_COVERAGE_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          git remote set-url origin git@github.com:chuanseng-ng/portfolio-weightage-eval.git

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: Pytest coverage comment
        id: coverageComment
        uses: MishaKav/pytest-coverage-comment@v1.2.0
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml

      - name: Update README with Coverage HTML
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COVERAGE_HTML: ${{ steps.coverageComment.outputs.coverageHtml }}
        run: |
          printf '%s\n' "$COVERAGE_HTML" > /tmp/coverage.html
          awk '
            /<!-- Pytest Coverage Comment:Begin -->/ {
              print
              while ((getline line < "/tmp/coverage.html") > 0) print line
              skip=1; next
            }
            /<!-- Pytest Coverage Comment:End -->/ { skip=0; print; next }
            !skip
          ' README.md > /tmp/README_updated.md && mv /tmp/README_updated.md README.md

      - name: Commit & Push changes to README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update coverage in README [skip ci]"
          git push origin main
